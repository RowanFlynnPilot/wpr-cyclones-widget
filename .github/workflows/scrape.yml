name: Fetch NA3HL Data

on:
  schedule:
    # In-season (Sep–Mar): every 30 min during game hours. Puck drops are
    # mostly 7:10 PM CT Fri/Sat, with occasional afternoon starts.
    # 4 PM – 11 PM CT = 22:00 – 05:00 UTC (CST is UTC-6; CDT shoulder weeks UTC-5).
    - cron: '*/30 22-23 * 9-12,1-3 *'   # 4–6 PM CT window, Sep–Mar
    - cron: '*/30 0-5 * 9-12,1-4 *'     # 6 PM – 11 PM CT window (next UTC day, so Apr covers late-Mar games)
    # Year-round: daily at noon CT to catch schedule changes and roster moves.
    - cron: '0 18 * * *'
  workflow_dispatch:                     # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/fetch_na3hl.py

      - name: Commit and push data
        run: |
          cd docs/data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          CHANGES=$(git diff --cached --stat)
          if [ -n "$CHANGES" ]; then
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "🏒 Update NA3HL data — ${TIMESTAMP}"
            git push
          else
            echo "No data changes detected, skipping commit."
          fi
